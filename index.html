<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>The Recipe Table</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cream: #FAF7F2; --warm-white: #FDF9F4; --ink: #1C1915; --ink-soft: #4A4540;
    --ink-muted: #8C8680; --rust: #C15B34; --rust-light: #F2E8E2; --sage: #5A6B52;
    --sage-light: #E8EDE6; --gold: #B8913A; --border: rgba(28,25,21,0.1);
    --fitness: #1A6B5A; --fitness-light: #E0F0EC;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--ink); font-size: 15px; line-height: 1.6; -webkit-tap-highlight-color: transparent; }

  header {
    background: var(--ink); color: var(--cream);
    padding: 0 1.25rem 0 1.5rem;
    display: flex; align-items: center; justify-content: space-between;
    height: 58px; position: sticky; top: 0; z-index: 100;
  }
  .logo { font-family: 'Playfair Display', serif; font-size: 20px; letter-spacing: 0.02em; color: var(--cream); }
  .logo span { color: var(--gold); font-style: italic; }
  .header-right { display: flex; align-items: center; gap: 0.75rem; }
  .nav-links { display: flex; gap: 1.5rem; list-style: none; }
  .nav-links a { color: rgba(250,247,242,0.65); text-decoration: none; font-size: 12px; font-weight: 400; letter-spacing: 0.05em; text-transform: uppercase; }
  @media (max-width: 600px) { .nav-links { display: none; } }

  .lang-toggle { display: flex; gap: 2px; background: rgba(255,255,255,0.1); border-radius: 6px; padding: 3px; }
  .lang-btn { padding: 4px 9px; border-radius: 4px; border: none; background: transparent; color: rgba(250,247,242,0.6); font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; cursor: pointer; letter-spacing: 0.04em; transition: all 0.15s; }
  .lang-btn.active { background: var(--gold); color: var(--ink); }

  .hero { background: var(--ink); color: var(--cream); padding: clamp(2.5rem,8vw,5rem) 1.5rem clamp(2rem,6vw,4rem); text-align: center; }
  .hero-eyebrow { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); margin-bottom: 1rem; font-weight: 500; }
  .hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(28px,7vw,60px); font-weight: 400; line-height: 1.1; margin-bottom: 1rem; }
  .hero h1 em { font-style: italic; color: var(--gold); }
  .hero p { color: rgba(250,247,242,0.6); font-size: clamp(14px,3.5vw,16px); max-width: 440px; margin: 0 auto; font-weight: 300; }

  .controls { background: var(--warm-white); border-bottom: 1px solid var(--border); padding: 1rem 1.25rem; display: flex; flex-direction: column; gap: 0.75rem; }
  .search-wrap { position: relative; width: 100%; }
  .search-wrap svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); width: 15px; height: 15px; color: var(--ink-muted); pointer-events: none; }
  #searchInput { width: 100%; padding: 10px 12px 10px 34px; border: 1px solid var(--border); border-radius: 8px; background: var(--cream); font-family: 'DM Sans', sans-serif; font-size: 15px; color: var(--ink); outline: none; transition: border-color 0.2s; -webkit-appearance: none; }
  #searchInput:focus { border-color: var(--rust); }
  #searchInput::placeholder { color: var(--ink-muted); }
  .filter-pills { display: flex; gap: 7px; overflow-x: auto; padding-bottom: 2px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .filter-pills::-webkit-scrollbar { display: none; }
  .pill { padding: 7px 15px; border-radius: 999px; border: 1px solid var(--border); background: transparent; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--ink-soft); cursor: pointer; transition: all 0.15s; white-space: nowrap; flex-shrink: 0; }
  .pill:hover { border-color: var(--rust); color: var(--rust); }
  .pill.active { background: var(--rust); border-color: var(--rust); color: white; }
  .pill[data-filter="fitness"].active { background: var(--fitness); border-color: var(--fitness); }

  main { max-width: 1200px; margin: 0 auto; padding: clamp(1.5rem,4vw,3rem) 1.25rem; }
  .section-header { display: flex; align-items: baseline; gap: 0.75rem; margin-bottom: 1.5rem; }
  .section-title { font-family: 'Playfair Display', serif; font-size: clamp(20px,4vw,26px); font-weight: 400; }
  .count-badge { font-size: 13px; color: var(--ink-muted); font-weight: 300; }

  .recipe-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(min(280px,100%),1fr)); gap: 1rem; }
  @media (max-width: 480px) { .recipe-grid { grid-template-columns: 1fr; } }

  .recipe-card { background: var(--warm-white); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; cursor: pointer; transition: transform 0.2s, border-color 0.2s; display: flex; flex-direction: column; }
  @media (hover: hover) { .recipe-card:hover { transform: translateY(-3px); border-color: rgba(28,25,21,0.2); } }
  @media (hover: none) { .recipe-card:active { opacity: 0.82; } }

  .card-thumb { height: 155px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
  .card-badge { position: absolute; top: 10px; right: 10px; padding: 3px 9px; border-radius: 999px; font-size: 10px; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; }
  .badge-quick { background: var(--sage-light); color: var(--sage); }
  .badge-popular { background: var(--rust-light); color: var(--rust); }
  .badge-vegan { background: #E6F0E8; color: #3A6B40; }
  .badge-fitness { background: var(--fitness-light); color: var(--fitness); }

  .card-body { padding: 1rem 1.1rem; flex: 1; display: flex; flex-direction: column; }
  .card-category { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-muted); margin-bottom: 4px; font-weight: 500; }
  .card-title { font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 600; line-height: 1.3; margin-bottom: 6px; color: var(--ink); }
  .card-desc { font-size: 13px; color: var(--ink-soft); line-height: 1.5; margin-bottom: 0.875rem; font-weight: 300; flex: 1; }
  .macro-row { display: flex; gap: 6px; margin-bottom: 0.6rem; flex-wrap: wrap; }
  .macro-pill { padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: 500; background: var(--fitness-light); color: var(--fitness); }
  .card-meta { display: flex; gap: 1rem; border-top: 1px solid var(--border); padding-top: 0.75rem; flex-wrap: wrap; }
  .meta-item { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--ink-muted); }
  .meta-item svg { width: 12px; height: 12px; flex-shrink: 0; }

  .overlay { display: none; position: fixed; inset: 0; background: rgba(28,25,21,0.6); z-index: 200; overflow-y: auto; }
  .overlay.open { display: block; }
  .detail-panel { background: var(--warm-white); max-width: 680px; min-height: 100dvh; position: relative; animation: slideUp 0.25s ease; }
  @media (min-width: 720px) {
    .overlay { display: none; align-items: center; justify-content: center; padding: 1.5rem; }
    .overlay.open { display: flex; }
    .detail-panel { min-height: unset; max-height: 88vh; overflow-y: auto; border-radius: 16px; margin: auto; }
  }
  @keyframes slideUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

  .detail-thumb { height: 195px; display: flex; align-items: center; justify-content: center; }
  @media (min-width: 720px) { .detail-thumb { border-radius: 16px 16px 0 0; } }
  .detail-content { padding: 1.5rem; }
  .detail-category { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-muted); margin-bottom: 5px; }
  .detail-title { font-family: 'Playfair Display', serif; font-size: clamp(22px,5vw,28px); font-weight: 600; margin-bottom: 0.6rem; line-height: 1.2; }
  .detail-desc { color: var(--ink-soft); margin-bottom: 1.25rem; font-weight: 300; line-height: 1.7; font-size: 14px; }
  .detail-stats { display: flex; gap: 1rem; padding: 0.875rem 1rem; background: var(--cream); border-radius: 10px; margin-bottom: 1rem; flex-wrap: wrap; }
  .stat { text-align: center; min-width: 58px; }
  .stat-val { font-size: 15px; font-weight: 500; color: var(--ink); }
  .stat-key { font-size: 10px; color: var(--ink-muted); text-transform: uppercase; letter-spacing: 0.07em; margin-top: 2px; }
  .detail-macros { display: flex; gap: 7px; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .detail-macro { padding: 5px 12px; border-radius: 8px; font-size: 12px; font-weight: 500; background: var(--fitness-light); color: var(--fitness); }
  .detail-section-title { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 600; margin-bottom: 0.6rem; padding-bottom: 0.4rem; border-bottom: 1px solid var(--border); }
  .ingredient-list { list-style: none; margin-bottom: 1.25rem; }
  .ingredient-list li { padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 14px; display: flex; gap: 0.75rem; color: var(--ink-soft); }
  .ingredient-list li::before { content: ''; width: 5px; height: 5px; background: var(--rust); border-radius: 50%; margin-top: 8px; flex-shrink: 0; }
  .step-list { list-style: none; margin-bottom: 1.25rem; padding-bottom: env(safe-area-inset-bottom, 1rem); }
  .step-list li { display: flex; gap: 0.875rem; margin-bottom: 0.875rem; font-size: 14px; color: var(--ink-soft); line-height: 1.65; }
  .step-num { background: var(--rust); color: white; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; flex-shrink: 0; margin-top: 1px; }
  .close-btn { position: absolute; top: 1rem; right: 1rem; width: 34px; height: 34px; border-radius: 50%; border: 1px solid rgba(250,247,242,0.4); background: rgba(28,25,21,0.4); color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; line-height: 1; z-index: 10; transition: background 0.15s; }
  .close-btn:hover { background: rgba(28,25,21,0.65); }

  .no-results { text-align: center; padding: 4rem 1rem; color: var(--ink-muted); display: none; }
  .no-results svg { width: 36px; height: 36px; margin-bottom: 0.875rem; opacity: 0.35; display: block; margin-left: auto; margin-right: auto; }
  footer { text-align: center; padding: 2rem 1.25rem; color: var(--ink-muted); font-size: 13px; border-top: 1px solid var(--border); margin-top: 1.5rem; font-weight: 300; }
  footer em { font-family: 'Playfair Display', serif; font-style: italic; }
</style>
</head>
<body>

<header>
  <div class="logo">The <span>Recipe</span> Table</div>
  <div class="header-right">
    <nav><ul class="nav-links"><li><a href="#" data-i18n="nav_all">All Recipes</a></li><li><a href="#" data-i18n="nav_fitness">Fitness</a></li></ul></nav>
    <div class="lang-toggle">
      <button class="lang-btn active" id="btnEN" onclick="setLang('en')">EN</button>
      <button class="lang-btn" id="btnFI" onclick="setLang('fi')">FI</button>
    </div>
  </div>
</header>

<div class="hero">
  <p class="hero-eyebrow" data-i18n="hero_eyebrow">A curated kitchen</p>
  <h1 data-i18n-html="hero_title">Cook with <em>intention,</em><br>eat with joy</h1>
  <p data-i18n="hero_sub">A handpicked collection of recipes for every season, mood, and occasion.</p>
</div>

<div class="controls">
  <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="search" id="searchInput" autocomplete="off" data-i18n-placeholder="search_placeholder" placeholder="Search recipes...">
  </div>
  <div class="filter-pills">
    <button class="pill active" data-filter="all" data-i18n="filter_all">All</button>
    <button class="pill" data-filter="breakfast" data-i18n="filter_breakfast">Breakfast</button>
    <button class="pill" data-filter="lunch" data-i18n="filter_lunch">Lunch</button>
    <button class="pill" data-filter="dinner" data-i18n="filter_dinner">Dinner</button>
    <button class="pill" data-filter="dessert" data-i18n="filter_dessert">Dessert</button>
    <button class="pill" data-filter="vegan" data-i18n="filter_vegan">Vegan</button>
    <button class="pill" data-filter="fitness" data-i18n="filter_fitness">Fitness</button>
  </div>
</div>

<main>
  <div class="section-header">
    <h2 class="section-title" data-i18n="section_title">All recipes</h2>
    <span class="count-badge" id="countBadge"></span>
  </div>
  <div class="recipe-grid" id="grid"></div>
  <div class="no-results" id="noResults">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <p data-i18n="no_results">No recipes match your search.</p>
  </div>
</main>

<div class="overlay" id="overlay">
  <div class="detail-panel" id="detailPanel">
    <button class="close-btn" id="closeBtn">&#xd7;</button>
    <div class="detail-thumb" id="detailThumb"></div>
    <div class="detail-content">
      <p class="detail-category" id="detailCategory"></p>
      <h2 class="detail-title" id="detailTitle"></h2>
      <p class="detail-desc" id="detailDesc"></p>
      <div class="detail-stats" id="detailStats"></div>
      <div class="detail-macros" id="detailMacros"></div>
      <h3 class="detail-section-title" data-i18n="ingredients">Ingredients</h3>
      <ul class="ingredient-list" id="detailIngredients"></ul>
      <h3 class="detail-section-title" data-i18n="method">Method</h3>
      <ol class="step-list" id="detailSteps"></ol>
    </div>
  </div>
</div>

<footer><em>The Recipe Table</em> &mdash; <span data-i18n="footer_made">made with care</span></footer>

<script>
const i18n = {
  en: {
    nav_all:"All Recipes", nav_fitness:"Fitness",
    hero_eyebrow:"A curated kitchen",
    hero_title:"Cook with <em>intention,</em><br>eat with joy",
    hero_sub:"A handpicked collection of recipes for every season, mood, and occasion.",
    search_placeholder:"Search recipes...",
    filter_all:"All", filter_breakfast:"Breakfast", filter_lunch:"Lunch",
    filter_dinner:"Dinner", filter_dessert:"Dessert", filter_vegan:"Vegan", filter_fitness:"Fitness",
    section_title:"All recipes", no_results:"No recipes match your search.",
    ingredients:"Ingredients", method:"Method", footer_made:"made with care",
    time_label:"Time", serves_label:"Serves", difficulty_label:"Difficulty",
    count_recipes:(n)=>`${n} recipe${n!==1?'s':''}`,
    cat_breakfast:"Breakfast", cat_lunch:"Lunch", cat_dinner:"Dinner",
    cat_dessert:"Dessert", cat_fitness:"Fitness",
    protein:"protein", carbs:"carbs", fat:"fat"
  },
  fi: {
    nav_all:"Kaikki reseptit", nav_fitness:"Fitness",
    hero_eyebrow:"Kurattu keitti\u00f6",
    hero_title:"Kokkaa <em>harkiten,</em><br>sy\u00f6 ilolla",
    hero_sub:"Valikoitu kokoelma reseptej\u00e4 joka sesonkiin, tunnelmaan ja tilaisuuteen.",
    search_placeholder:"Hae reseptej\u00e4...",
    filter_all:"Kaikki", filter_breakfast:"Aamiainen", filter_lunch:"Lounas",
    filter_dinner:"Illallinen", filter_dessert:"J\u00e4lkiruoka", filter_vegan:"Vegaani", filter_fitness:"Fitness",
    section_title:"Kaikki reseptit", no_results:"Ei hakua vastaavia reseptej\u00e4.",
    ingredients:"Ainekset", method:"Valmistus", footer_made:"tehty rakkaudella",
    time_label:"Aika", serves_label:"Annokset", difficulty_label:"Vaikeustaso",
    count_recipes:(n)=>`${n} resepti${n!==1?'\u00e4':''}`,
    cat_breakfast:"Aamiainen", cat_lunch:"Lounas", cat_dinner:"Illallinen",
    cat_dessert:"J\u00e4lkiruoka", cat_fitness:"Fitness",
    protein:"proteiinia", carbs:"hiilareita", fat:"rasvaa"
  }
};

const badgeLabels = {
  badge_quick:{en:"Quick",fi:"Nopea"},
  badge_popular:{en:"Popular",fi:"Suosittu"},
  badge_vegan:{en:"Vegan",fi:"Vegaani"},
  badge_fitness:{en:"Fitness",fi:"Fitness"}
};

const recipes = [
  { id:1, emoji:"🌾", bg:"#FFF3E0", category:"breakfast", tags:["breakfast"], badge:"quick", badgeKey:"badge_quick",
    en:{ title:"Golden turmeric porridge", desc:"A warming, anti-inflammatory bowl of oats with golden spices, honey, and toasted seeds.",
      ingredients:["1 cup rolled oats","2 cups oat milk","1 tsp turmeric","½ tsp cinnamon","Pinch of black pepper","2 tbsp honey or maple syrup","2 tbsp pumpkin seeds","1 tbsp flaxseeds"],
      steps:["Combine oats and oat milk in a saucepan over medium heat.","Stir in turmeric, cinnamon, and black pepper.","Cook for 5–7 minutes, stirring frequently, until thick and creamy.","Spoon into bowls, drizzle with honey, and top with toasted seeds."] },
    fi:{ title:"Kultainen kurkumapuuro", desc:"L\u00e4mmitt\u00e4v\u00e4 kaurapuuro kultaisilla mausteilla, hunajalla ja paahdituilla siemenill\u00e4.",
      ingredients:["1 dl kaurahiutaleita","2 dl kauramaitoa","1 tl kurkumaa","½ tl kanelia","Ripaus mustapippuria","2 rkl hunajaa tai vaahterasiirappia","2 rkl kurpitsansiemeni\u00e4","1 rkl pellavansiemeni\u00e4"],
      steps:["Yhdist\u00e4 kaura ja kauramaito kattilassa keskilämmöllä.","Lis\u00e4\u00e4 kurkuma, kaneli ja mustapippuri.","Keitä 5–7 min sekoittaen, kunnes puuro on paksua.","Annostele kulhoihin, lisää hunaja ja paahdetut siemenet."] },
    time:"15 min", serves:"2", difficulty:{en:"Easy",fi:"Helppo"} },

  { id:2, emoji:"🍅", bg:"#FFEBEE", category:"lunch", tags:["vegan","lunch"], badge:"vegan", badgeKey:"badge_vegan",
    en:{ title:"Roasted tomato & white bean soup", desc:"Deep, slow-roasted tomatoes blended with creamy cannellini beans and a swirl of basil oil.",
      ingredients:["800g cherry tomatoes","4 garlic cloves","1 can cannellini beans, drained","500ml vegetable stock","3 tbsp olive oil","1 tsp smoked paprika","Salt & pepper","Fresh basil to serve"],
      steps:["Preheat oven to 200°C. Toss tomatoes and garlic in 2 tbsp olive oil. Roast 25 min.","Transfer to a pot. Add beans, stock, and paprika. Simmer 10 minutes.","Blend until smooth. Season well.","Serve drizzled with olive oil and torn basil."] },
    fi:{ title:"Paistettu tomaatti-valkopapukeitto", desc:"Hitaasti paistetut tomaatit sekoitettuna kermaisten cannellini-papujen ja basilika\u00f6ljyn kanssa.",
      ingredients:["800 g kirsikkatomaatteja","4 valkosipulinkyntt\u00e4","1 prk cannellini-papuja, valutettu","5 dl kasvislient\u00e4","3 rkl oliivilj\u00f6y\u00e4","1 tl savupaprikaa","Suola ja pippuri","Tuoretta basilikaa"],
      steps:["Kuumenna uuni 200°C. Pyörittele tomaatit ja valkosipuli öljyssä. Paista 25 min.","Siirrä kattilaan. Lisää pavut, liemi ja paprika. Hauduta 10 min.","Soseuta tasaiseksi. Mausta hyvin.","Tarjoile öljyllä ja basilikalla."] },
    time:"45 min", serves:"4", difficulty:{en:"Easy",fi:"Helppo"} },

  { id:3, emoji:"🍋", bg:"#FFFDE7", category:"dinner", tags:["dinner"], badge:"popular", badgeKey:"badge_popular",
    en:{ title:"Lemon herb roast chicken", desc:"A classic Sunday roast with crispy skin, fragrant herbs under the breast, and bright lemon.",
      ingredients:["1 whole chicken (about 1.8kg)","1 lemon, halved","4 garlic cloves","3 tbsp softened butter","1 tbsp fresh thyme leaves","1 tbsp fresh rosemary, chopped","Salt & black pepper","Olive oil"],
      steps:["Preheat oven to 200°C. Mix butter with thyme, rosemary, and lemon zest.","Push herb butter under the skin over the breast.","Stuff cavity with lemon and garlic. Rub skin with oil and season.","Roast 1 hr 20 min until juices run clear. Rest 15 minutes."] },
    fi:{ title:"Sitruuna-yrtti-paahtokanapaistos", desc:"Klassinen sunnuntaipaistos rapealla nahalla, aromaattisilla yrteill\u00e4 ja kirpe\u00e4ll\u00e4 sitruunalla.",
      ingredients:["1 kokonainen kana (n. 1,8 kg)","1 sitruuna, puoliksi","4 valkosipulinkyntt\u00e4","3 rkl pehmeit\u00e4 voita","1 rkl tuoreita timjaminlehti\u00e4","1 rkl tuoretta rosmariinia hienonnettuna","Suola ja mustapippuri","Oliivilj\u00f6y\u00e4"],
      steps:["Kuumenna uuni 200°C. Sekoita voi yrttien ja sitruunankuoren kanssa.","Ty\u00f6nn\u00e4 yrttivoi ihon alle.","T\u00e4yt\u00e4 ontelo sitruunalla ja valkosipulilla. Hiero iho \u00f6ljyll\u00e4 ja mausta.","Paista 1 h 20 min kunnes nesteet kirkkaita. Lepuuta 15 min."] },
    time:"1 h 30 min", serves:"4", difficulty:{en:"Medium",fi:"Keskivaikea"} },

  { id:4, emoji:"🍫", bg:"#EFEBE9", category:"dessert", tags:["dessert"], badge:"popular", badgeKey:"badge_popular",
    en:{ title:"Dark chocolate lava cakes", desc:"Intensely chocolatey individual cakes with a molten, flowing centre. Effortlessly impressive.",
      ingredients:["150g dark chocolate (70%)","100g unsalted butter","3 eggs + 3 egg yolks","80g caster sugar","2 tbsp plain flour","Cocoa powder for dusting","Vanilla ice cream to serve"],
      steps:["Preheat oven to 200°C. Butter 4 ramekins and dust with cocoa.","Melt chocolate and butter together. Cool slightly.","Whisk eggs, yolks, and sugar until pale. Fold in chocolate, then flour.","Pour into ramekins. Bake 10–12 min until edges are set, centre still wobbles.","Turn out and serve immediately with vanilla ice cream."] },

let lang = "en", activeFilter = "all", searchQuery = "";

function t(k){ return i18n[lang][k] || i18n.en[k] || k; }

function setLang(l){
  lang = l;
  document.getElementById("btnEN").classList.toggle("active", l==="en");
  document.getElementById("btnFI").classList.toggle("active", l==="fi");
  applyTranslations();
  renderGrid();
}

function applyTranslations(){
  document.querySelectorAll("[data-i18n]").forEach(el=>{ const v=i18n[lang][el.dataset.i18n]; if(v) el.textContent=v; });
  document.querySelectorAll("[data-i18n-html]").forEach(el=>{ const v=i18n[lang][el.dataset.i18nHtml]; if(v) el.innerHTML=v; });
  document.querySelectorAll("[data-i18n-placeholder]").forEach(el=>{ const v=i18n[lang][el.dataset.i18nPlaceholder]; if(v) el.placeholder=v; });
}

function getBadgeHTML(r){
  if(!r.badge||!r.badgeKey) return "";
  const label=badgeLabels[r.badgeKey][lang];
  const cls={quick:"badge-quick",popular:"badge-popular",vegan:"badge-vegan",fitness:"badge-fitness"}[r.badge]||"";
  return `<span class="card-badge ${cls}">${label}</span>`;
}

function getMacroRowHTML(r){
  if(!r.macros) return "";
  return `<div class="macro-row"><span class="macro-pill">${r.macros.kcal} kcal</span><span class="macro-pill">${r.macros.protein}g ${t("protein")}</span></div>`;
}

function renderGrid(){
  const grid=document.getElementById("grid");
  const noR=document.getElementById("noResults");
  const count=document.getElementById("countBadge");
  const filtered=recipes.filter(r=>{
    const mf=activeFilter==="all"||r.tags.includes(activeFilter);
    const q=searchQuery.toLowerCase();
    const rd=r[lang];
    const ms=!q||rd.title.toLowerCase().includes(q)||rd.desc.toLowerCase().includes(q)||r.category.includes(q);
    return mf&&ms;
  });
  count.textContent=i18n[lang].count_recipes(filtered.length);
  if(filtered.length===0){ grid.innerHTML=""; noR.style.display="block"; return; }
  noR.style.display="none";
  grid.innerHTML=filtered.map(r=>{
    const rd=r[lang];
    const catLabel=i18n[lang][`cat_${r.category}`]||r.category;
    const diff=typeof r.difficulty==="object"?r.difficulty[lang]:r.difficulty;
    return `<div class="recipe-card" onclick="openDetail(${r.id})">
      <div class="card-thumb" style="background:${r.bg}">
        <span style="font-size:50px">${r.emoji}</span>
        ${getBadgeHTML(r)}
      </div>
      <div class="card-body">
        <p class="card-category">${catLabel}</p>
        <h3 class="card-title">${rd.title}</h3>
        ${getMacroRowHTML(r)}
        <p class="card-desc">${rd.desc}</p>
        <div class="card-meta">
          <span class="meta-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${r.time}</span>
          <span class="meta-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>${lang==="fi"?"Ann.":"Srv."} ${r.serves}</span>
          <span class="meta-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>${diff}</span>
        </div>
      </div>
    </div>`;
  }).join("");
}

function openDetail(id){
  const r=recipes.find(x=>x.id===id); if(!r) return;
  const rd=r[lang];
  const catLabel=i18n[lang][`cat_${r.category}`]||r.category;
  const diff=typeof r.difficulty==="object"?r.difficulty[lang]:r.difficulty;
  document.getElementById("detailThumb").style.background=r.bg;
  document.getElementById("detailThumb").innerHTML=`<span style="font-size:72px">${r.emoji}</span>`;
  document.getElementById("detailCategory").textContent=catLabel.toUpperCase();
  document.getElementById("detailTitle").textContent=rd.title;
  document.getElementById("detailDesc").textContent=rd.desc;
  document.getElementById("detailStats").innerHTML=`
    <div class="stat"><div class="stat-val">${r.time}</div><div class="stat-key">${t("time_label")}</div></div>
    <div class="stat"><div class="stat-val">${r.serves}</div><div class="stat-key">${t("serves_label")}</div></div>
    <div class="stat"><div class="stat-val">${diff}</div><div class="stat-key">${t("difficulty_label")}</div></div>
    ${r.macros?`<div class="stat"><div class="stat-val">${r.macros.kcal}</div><div class="stat-key">kcal</div></div>`:""}`;
  const dm=document.getElementById("detailMacros");
  if(r.macros){ dm.style.display="flex"; dm.innerHTML=`<span class="detail-macro">${r.macros.protein}g ${t("protein")}</span><span class="detail-macro">${r.macros.carbs}g ${t("carbs")}</span><span class="detail-macro">${r.macros.fat}g ${t("fat")}</span>`; }
  else { dm.style.display="none"; dm.innerHTML=""; }
  document.getElementById("detailIngredients").innerHTML=rd.ingredients.map(i=>`<li>${i}</li>`).join("");
  document.getElementById("detailSteps").innerHTML=rd.steps.map((s,i)=>`<li><span class="step-num">${i+1}</span><span>${s}</span></li>`).join("");
  const ov=document.getElementById("overlay");
  ov.classList.add("open"); ov.scrollTop=0; document.body.style.overflow="hidden";
}

function closeDetail(){ document.getElementById("overlay").classList.remove("open"); document.body.style.overflow=""; }
document.getElementById("closeBtn").onclick=closeDetail;
document.getElementById("overlay").onclick=(e)=>{ if(e.target===document.getElementById("overlay")) closeDetail(); };
document.addEventListener("keydown",(e)=>{ if(e.key==="Escape") closeDetail(); });
document.querySelectorAll(".pill").forEach(p=>{ p.onclick=()=>{ document.querySelectorAll(".pill").forEach(x=>x.classList.remove("active")); p.classList.add("active"); activeFilter=p.dataset.filter; renderGrid(); }; });
document.getElementById("searchInput").oninput=(e)=>{ searchQuery=e.target.value; renderGrid(); };
applyTranslations();
renderGrid();
</script>
